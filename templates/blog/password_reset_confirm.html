{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 500px; margin: 80px auto; padding: 0 20px;">
    <div class="card p-4 p-md-5 rounded-0 border border-secondary-subtle shadow-sm">
        <h3 class="text-uppercase fw-bold mb-4" style="letter-spacing: 2px; font-size: 20px; border-bottom: 2px solid #111; padding-bottom: 10px;">Yangi parol kiritish</h3>
        {% if validlink %}
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-uppercase text-muted small fw-bold" style="letter-spacing: 1px;">{{ field.label }}</label>
                        <input type="password" name="{{ field.name }}" class="form-control rounded-0 border-secondary-subtle" required>
                        {% if field.help_text %}<small class="form-text text-muted" style="font-size: 11px;">{{ field.help_text }}</small>{% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn text-uppercase rounded-0 w-100 py-2 mt-2" style="background-color: #111; color: #fff; font-size: 13px; letter-spacing: 1px; border: none;">
                    Parolni yangilash
                </button>
            </form>
        {% else %}
            <div class="text-center">
                <p class="text-danger fw-bold">Havola yaroqsiz!</p>
                <a href="{% url 'password_reset' %}" class="btn btn-outline-dark rounded-0 text-uppercase btn-sm mt-2" style="font-size: 11px;">Qayta urinish</a>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
