{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 500px; margin: 80px auto; padding: 0 20px;">
    <div class="card p-4 p-md-5 rounded-0 border border-secondary-subtle shadow-sm">
        <h3 class="text-uppercase fw-bold mb-3" style="letter-spacing: 2px; font-size: 20px; border-bottom: 2px solid #111; padding-bottom: 10px;">Parolni tiklash</h3>
        <p class="text-muted small mb-4">Profilingizga ulangan Email manzilingizni kiriting. Biz sizga parolni yangilash havolasini yuboramiz.</p>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label text-uppercase text-muted small fw-bold" style="letter-spacing: 1px;">{{ field.label }}</label>
                    <input type="email" name="{{ field.name }}" class="form-control rounded-0 border-secondary-subtle" required>
                </div>
            {% endfor %}
            <button type="submit" class="btn text-uppercase rounded-0 w-100 py-2 mt-2" style="background-color: #111; color: #fff; font-size: 13px; letter-spacing: 1px; border: none;">
                Havolani yuborish
            </button>
        </form>
    </div>
</div>
{% endblock %}
